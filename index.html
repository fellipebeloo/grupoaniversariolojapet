<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Grupo VIP - Aniversário 27 Anos Loja Pet 🐾</title>
  <!-- Tailwind CSS Script for static HTML -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Configure Tailwind theme settings if necessary -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#dc395a',
            link: '#1a55a1'
          },
          animation: {
            'shake': 'shake 0.3s ease-in-out infinite',
          },
          keyframes: {
            shake: {
              '0%, 100%': { transform: 'translateX(0) rotate(0deg)' },
              '20%, 60%': { transform: 'translateX(-3px) rotate(-2deg)' },
              '40%, 80%': { transform: 'translateX(3px) rotate(2deg)' },
            }
          }
        }
      }
    }
  </script>

  <!-- Facebook Pixel Code -->
  <script>
    !function (f, b, e, v, n, t, s) {
      if (f.fbq) return; n = f.fbq = function () {
        n.callMethod ?
          n.callMethod.apply(n, arguments) : n.queue.push(arguments)
      };
      if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0';
      n.queue = []; t = b.createElement(e); t.async = !0;
      t.src = v; s = b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t, s)
    }(window, document, 'script',
      'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '8275418952554723');
    fbq('track', 'PageView');
  </script>
  <!-- End Facebook Pixel Code -->
</head>

<body class="antialiased">

  <!-- Container Principal do Fundo (equivalente à div h-dvh) -->
  <div class="h-screen w-full bg-cover bg-center" style="background-image: url('public/background.jpg');">
    <!-- Sobreposição escura -->
    <div class="h-full w-full bg-black/75 flex flex-col items-center justify-center p-4">

      <!-- Cabeçalho (Header) -->
      <header class="text-center mb-8">
        <!-- Avatar Circular -->
        <div
          class="w-24 h-24 mx-auto mb-4 border-4 border-primary rounded-full overflow-hidden flex items-center justify-center bg-gray-200">
          <img src="public/lojapet.png" alt="Loja Pet Avatar" class="w-full h-full object-cover rounded-full"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <!-- Avatar Fallback -->
          <span class="text-gray-500 font-bold hidden w-full h-full items-center justify-center bg-gray-200">LP</span>
        </div>

        <h1 class="text-2xl font-bold text-white">Você foi convidado! 🥳</h1>
        <p class="text-gray-300">Participe do nosso grupo VIP e receba ofertas exclusivas para o Aniversário de 27 Anos.
        </p>
      </header>

      <!-- Card/Mensagem Convite (Componente GroupInviteMessage) -->
      <div class="w-full max-w-md">
        <div class="flex flex-col rounded-lg bg-white text-gray-800 shadow-lg overflow-hidden">

          <!-- Cabeçalho da Mensagem -->
          <div class="p-3 flex items-center gap-3 bg-gray-50">
            <div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center flex-shrink-0">
              <!-- Ícone MessageSquare (SVG embutido) -->
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="text-white">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              </svg>
            </div>
            <div class="text-left flex-grow">
              <p class="font-semibold text-gray-900">ANIVERSÁRIO 27 ANOS LOJA PET 🐾</p>
              <p class="text-sm text-gray-500">Ofertas Exclusivas - Dia 07/03</p>
            </div>
          </div>

          <!-- Corpo da Mensagem -->
          <div class="p-3 text-left">
            <p class="text-sm text-gray-600">
              Acesse este link para entrar no grupo:
              <br />
              <a href="https://chat.whatsapp.com/CPIetUj2LqTIEsXfodIVFz?mode=gi_t" target="_blank"
                onclick="trackLeadAndOpen(event, this.href)" class="text-link break-all font-medium hover:underline">
                https://chat.whatsapp.com/CPIetUj2LqTIEsXfodIVFz?mode=gi_t
              </a>
            </p>
          </div>

          <div class="border-t border-gray-200">
            <button onclick="trackLeadAndOpen(event, 'https://chat.whatsapp.com/CPIetUj2LqTIEsXfodIVFz?mode=gi_t')"
              class="w-full text-center py-3 px-3 text-primary hover:bg-gray-100 transition-colors text-sm font-bold cursor-pointer">
              Ver Grupo
            </button>
          </div>

        </div>
      </div>

      <!-- Botão Principal Animado Festivo -->
      <div class="mt-8 w-full max-w-md">
        <button onclick="trackLeadAndOpen(event, 'https://chat.whatsapp.com/CPIetUj2LqTIEsXfodIVFz?mode=gi_t')"
          class="w-full py-4 bg-gradient-to-r from-yellow-500 to-yellow-400 text-gray-900 font-extrabold rounded-lg shadow-[0_0_15px_rgba(234,179,8,0.5)] hover:opacity-90 transition-transform transform hover:scale-105 text-lg animate-shake cursor-pointer border-b-4 border-yellow-600 uppercase tracking-wide">
          🎉 Entrar no Grupo VIP
        </button>
      </div>

    </div>
  </div>

  <!-- Script de Lógica e Eventos -->
  <script>
    /**
     * Dispara o evento de Lead do Facebook Pixel e abre a URL.
     */
    function trackLeadAndOpen(event, url) {
      // Previne o comportamento padrão (necessário se estivesse usando <a> para o botão)
      if (event && event.preventDefault && event.target.tagName !== 'A') {
        event.preventDefault();
      }

      // Dispara o evento de Lead do Facebook Pixel (caso o script fbq esteja presente no futuro)
      if (typeof window.fbq === 'function') {
        window.fbq('track', 'Lead');
      }

      // Redirecionamento
      window.open(url, '_blank');
    }
  </script>
</body>

</html>
